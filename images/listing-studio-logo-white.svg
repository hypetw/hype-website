<svg viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HYPE Listing Studio">
  <!-- charcoal card so the white logo is visible. Delete this rect for transparent-on-dark use. -->
  <rect x="0" y="0" width="360" height="280" rx="22" fill="#1A1A1A"/>

  <!-- ROOF: exactly 3 lines -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="153,66 180,42 207,66"/>
    <polyline points="160,66 180,48 200,66"/>
    <polyline points="167,66 180,54 193,66"/>
  </g>

  <!-- HOUSE: 9 squares (3 x 3). 6 filled, 3 open (2 windows + 1 doorway) -->
  <g fill="#FFFFFF">
    <rect x="173" y="70" width="14" height="14" rx="1.5"/>
    <rect x="155" y="88" width="14" height="14" rx="1.5"/>
    <rect x="173" y="88" width="14" height="14" rx="1.5"/>
    <rect x="191" y="88" width="14" height="14" rx="1.5"/>
    <rect x="155" y="106" width="14" height="14" rx="1.5"/>
    <rect x="191" y="106" width="14" height="14" rx="1.5"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-width="1.4">
    <rect x="155" y="70" width="14" height="14" rx="1.5"/>
    <rect x="191" y="70" width="14" height="14" rx="1.5"/>
    <rect x="173" y="106" width="14" height="14" rx="1.5"/>
  </g>

  <!-- WORDMARK -->
  <text x="180" y="196" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="3" fill="#FFFFFF">HYPE</text>
  <text x="180" y="222" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="4" fill="#FFFFFF">LISTING STUDIO</text>
</svg>
